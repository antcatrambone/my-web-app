<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My 90 Days">
<meta name="theme-color" content="#0c0c0f">
<title>My 90-Day Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #131318;
    --card: #18181f;
    --border: #252530;
    --gold: #e8b84b;
    --gold-dim: #a07a28;
    --teal: #2ec4a9;
    --rose: #e0546a;
    --lavender: #a08de8;
    --text: #e4e4f0;
    --muted: #6a6a88;
    --white: #ffffff;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  .app-header {
    padding: calc(var(--safe-top) + 14px) 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .app-eyebrow { font-size: 10px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--white); line-height: 1.1; }
  .app-title em { color: var(--gold); font-style: italic; }
  .day-badge {
    background: var(--gold);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap { padding: 10px 20px 0; flex-shrink: 0; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold), var(--teal)); border-radius: 2px; transition: width 0.4s ease; }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .progress-label { font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    overflow-x: auto;
    padding: 10px 16px 0;
    gap: 4px;
    flex-shrink: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: transparent;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }

  /* ── SCROLL CONTENT ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 16px 16px calc(var(--safe-bottom) + 20px);
  }

  /* ── CARDS ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 16px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-body { padding: 0 18px 18px; }
  .chevron { color: var(--muted); font-size: 18px; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }

  /* ── WEEK NUMBER ── */
  .week-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; opacity: 0.45; flex-shrink: 0; }
  .week-meta { flex: 1; }
  .week-phase { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
  .week-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.2; }

  /* ── SECTION LABEL ── */
  .section-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px; }

  /* ── OBJECTIVE BOX ── */
  .obj-box { padding: 12px 14px; border-radius: 10px; border-left: 3px solid; margin-bottom: 4px; }
  .obj-box p { font-size: 13px; line-height: 1.65; }

  /* ── TASKS ── */
  .task-item { border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; cursor: pointer; }
  .task-num { width: 22px; height: 22px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .task-info { flex: 1; }
  .task-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .task-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .task-detail { font-size: 12px; color: var(--muted); line-height: 1.65; background: var(--surface); padding: 12px; border-radius: 8px; margin: 0 0 12px 34px; }

  /* ── REFLECTION ── */
  .reflection-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .reflection-diamond { color: var(--gold); flex-shrink: 0; font-size: 10px; margin-top: 3px; }
  .reflection-text { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.6; }

  /* ── DELIVERABLE ── */
  .deliverable { background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.3); border-radius: 10px; padding: 14px; margin-top: 4px; }
  .deliverable-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .deliverable-text { font-size: 12px; color: var(--text); line-height: 1.6; }

  /* ── OVERVIEW CARDS ── */
  .phase-card { border-radius: 14px; padding: 18px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; border-top-width: 3px; }
  .phase-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .phase-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .phase-tagline { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .phase-arrow { font-size: 12px; margin-top: 10px; }

  /* ── STAT ROW ── */
  .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--gold); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }

  /* ── PERSONAL BANNER ── */
  .personal-banner { background: linear-gradient(135deg, rgba(224,84,106,0.15), rgba(46,196,169,0.1)); border: 1px solid rgba(232,184,75,0.2); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
  .personal-banner h3 { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--white); margin-bottom: 8px; }
  .personal-banner p { font-size: 13px; color: var(--muted); line-height: 1.65; }

  /* ── SCORECARD ── */
  .check-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .check-item:last-child { border-bottom: none; }
  .check-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .check-box.checked { border-color: var(--teal); background: rgba(46,196,169,0.2); }
  .check-label { font-size: 13px; transition: all 0.15s; }
  .check-label.checked { color: var(--muted); text-decoration: line-through; }

  /* ── QUIT STRATEGY ── */
  .quit-section { margin-bottom: 12px; }
  .quit-rule { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .quit-rule:last-child { border-bottom: none; }
  .quit-bullet { color: var(--rose); flex-shrink: 0; font-size: 8px; margin-top: 5px; }
  .quit-text { font-size: 13px; color: var(--text); line-height: 1.55; }
  .note-box { background: rgba(224,84,106,0.1); border-left: 3px solid var(--rose); border-radius: 0 8px 8px 0; padding: 12px; margin-top: 10px; font-size: 12px; color: var(--text); line-height: 1.6; font-style: italic; }

  /* ── SCHEDULE ── */
  .sched-row { display: flex; gap: 14px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .sched-row:last-child { border-bottom: none; }
  .sched-time { font-size: 11px; font-weight: 600; min-width: 88px; flex-shrink: 0; }
  .sched-act { font-size: 13px; color: var(--text); line-height: 1.4; }

  /* ── AI PATH ── */
  .ai-tool { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .ai-tool:last-child { border-bottom: none; }
  .ai-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .ai-tool-name { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
  .ai-tool-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* ── INSTALL BANNER ── */
  .install-tip { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; }
  .install-tip-icon { font-size: 20px; flex-shrink: 0; }
  .install-tip-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .install-tip-text strong { color: var(--gold); }

  /* active states */
  .task-row:active { opacity: 0.7; }
  .card-header:active { opacity: 0.8; }
  .check-item:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-top">
    <div>
      <div class="app-eyebrow">Your Intentional Exit</div>
      <div class="app-title">My <em>90-Day</em> Plan</div>
    </div>
    <div class="day-badge" id="dayBadge">Day 1</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-labels">
    <span class="progress-label" style="color:var(--rose)">Exit & Reset</span>
    <span class="progress-label" style="color:var(--teal)">Discover & Build</span>
    <span class="progress-label" style="color:var(--lavender)">Launch & Land</span>
  </div>
</div>

<!-- NAV -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('overview',this)">Overview</button>
  <button class="nav-tab" onclick="showTab('weeks',this)">Weeks</button>
  <button class="nav-tab" onclick="showTab('ai',this)">AI Path</button>
  <button class="nav-tab" onclick="showTab('quit',this)">Exit Strategy</button>
  <button class="nav-tab" onclick="showTab('schedule',this)">Daily Rhythm</button>
  <button class="nav-tab" onclick="showTab('scorecard',this)">Scorecard</button>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scrollArea"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
const START_DATE_KEY = 'plan_start_date';

function getStartDate() {
  let d = localStorage.getItem(START_DATE_KEY);
  if (!d) { d = new Date().toISOString().split('T')[0]; localStorage.setItem(START_DATE_KEY, d); }
  return new Date(d);
}

function getDayNumber() {
  const start = getStartDate();
  const now = new Date();
  const diff = Math.floor((now - start) / (1000*60*60*24)) + 1;
  return Math.min(Math.max(diff, 1), 90);
}

const phases = [
  { id: 0, label: 'Phase 1', title: 'Exit & Reset', weeks: 'Weeks 1–3', tagline: 'Leave with grace. Breathe. Get clear.', color: 'var(--rose)' },
  { id: 1, label: 'Phase 2', title: 'Discover & Build', weeks: 'Weeks 4–9', tagline: 'Validate paths. Master AI. Build your portfolio.', color: 'var(--teal)' },
  { id: 2, label: 'Phase 3', title: 'Launch & Land', weeks: 'Weeks 10–13', tagline: 'Go to market. Get hired. Generate income.', color: 'var(--lavender)' },
];

const phaseColors = ['var(--rose)', 'var(--teal)', 'var(--lavender)'];

const weeks = [
  {
    week: 1, phase: 0, title: 'The Clean Exit',
    objective: 'Quit your job with intention, professionalism, and zero regret. How you leave is permanent — make it count.',
    why: 'You\'ve been high-performing in revenue strategy for years. That means your reputation is an asset. A clean exit protects it. Burning bridges or slinking out cost you — even from a job you\'re done with.',
    tasks: [
      { task: 'Write your private "Why I\'m Leaving" letter', time: '2 hrs', detail: 'This is for you only. Write 2–3 pages: What am I actually tired of? What am I afraid to admit? What would I regret if I stayed? Keep this letter — you\'ll want to read it when doubt hits in Week 5.' },
      { task: 'Draft and submit your resignation', time: '1.5 hrs', detail: 'Short, warm, forward-looking. Three paragraphs: gratitude, your end date, offer to transition. Never explain your reasons in writing. Template in the Exit Strategy tab.' },
      { task: 'Build your handoff document', time: '2 hrs', detail: 'List everything you own: processes, dashboards, recurring tasks, key contacts. Offer to train your replacement. Leaving organized = leaving powerful.' },
      { task: 'Save anonymized work samples', time: '1 hr', detail: 'Before you lose access: save clean versions of frameworks, models, decks, and dashboards you built. These become portfolio evidence. No proprietary data — just proof of your thinking.' },
      { task: 'Have the conversation', time: '30 min', detail: 'Ask for a private meeting. Lead with gratitude. State your decision clearly: "I\'ve made the decision to move on. My last day will be X." Don\'t over-explain. Don\'t negotiate.' },
    ],
    reflections: [
      'What am I most afraid will happen after I quit — and is that fear based in reality?',
      'What would I tell a close friend who was in my exact position?',
      'What does success look like for me personally in 6 months?',
    ],
    deliverable: 'Resignation submitted. Handoff doc drafted. Work samples saved. Private letter written.',
  },
  {
    week: 2, phase: 0, title: 'The Decompression',
    objective: 'Fully stop. Let your nervous system actually recover. Resist every urge to be productive immediately.',
    why: 'Burnout creates a deficit that can\'t be fixed by just stopping work. Your brain needs slow, undemanding stimulation. If you jump straight into planning mode, you\'ll rebuild on a depleted foundation — and end up back here in 18 months.',
    tasks: [
      { task: 'No laptop before 10am — 7 days straight', time: 'Daily', detail: 'Start every morning with movement. A walk, workout, or stretch. No screens for the first 2 hours. This is the hardest rule and the most important one.' },
      { task: 'Do one completely non-productive thing each day', time: '2–4 hrs', detail: 'Cook something new. Visit a museum. Watch a documentary rabbit hole. Read fiction. The goal is to remember you\'re a full human, not just a high performer.' },
      { task: '7-day sleep audit', time: 'Ongoing', detail: 'No alarm unless necessary. Track how many hours your body actually wants. Most burned-out professionals are 1–2 hours chronically short. This data matters.' },
      { task: 'Morning pages every day', time: '30 min', detail: '3 pages of stream-of-consciousness writing. No editing, no audience. Whatever comes up. This surfaces what you\'ve been suppressing and begins creating real mental clarity.' },
      { task: 'Identify 3 things you want to explore "just for fun"', time: '1 hr', detail: 'Not career-related. What have you been curious about but never had time for? Write them down. You\'ll do one of them in Week 3.' },
    ],
    reflections: [
      'What comes up when I have nothing I "have to" do?',
      'What kind of person do I want to be — not just what job do I want to have?',
      'When in my career did I feel most alive and actually engaged?',
    ],
    deliverable: '7-day sleep log. Morning pages journal started. 3 exploration interests identified.',
  },
  {
    week: 3, phase: 0, title: 'The Clarity Audit',
    objective: 'Run structured exercises to identify what you actually want — from work, money, and life.',
    why: 'Your background in revenue strategy means you\'re wired to optimize systems. Now you need to optimize for the right outcomes. Most people jump from one bad fit to another because they never interrogated their actual values.',
    tasks: [
      { task: 'Complete the Ikigai mapping exercise', time: '2 hrs', detail: 'Map 4 circles: What you love | What you\'re good at | What the world needs | What you can be paid for. Write 5–10 answers each. Where they overlap is your signal. Be specific — not "strategy" but "designing systems that help sales teams stop flying blind."' },
      { task: 'Run the Energy Audit on your last role', time: '2 hrs', detail: 'List every type of task/meeting/project from your last role. Mark each: Energizing (+) or Draining (-). The pattern reveals what types of work you should actually be designing your next chapter around.' },
      { task: 'Write your ideal work week — unconstrained', time: '2 hrs', detail: 'Ignore what\'s "realistic." Write a detailed description of your ideal Tuesday two years from now. When do you wake up? What do you work on? Who do you interact with? How much do you earn? How do you feel at 6pm? Be uncomfortably specific.' },
      { task: 'Research 3 career paths that interest you', time: '4 hrs', detail: 'For each path (e.g., AI Strategy Consultant, VP RevOps at a Series B, Operator of a small AI-tools business): research salary, day-to-day reality, required skills, and find 3 real people on LinkedIn doing it. Don\'t evaluate yet.' },
      { task: 'Define your financial floor', time: '1 hr', detail: 'Monthly expenses + 20% buffer = your floor number. Any path that clears this is viable. Knowing this removes enormous anxiety and gives you a clear target for freelance rates or minimum salary.' },
    ],
    reflections: [
      'What did the energy audit reveal that surprised me?',
      'Which career path excites me most right now — and why?',
      'Am I running toward something, or just away from my last job?',
    ],
    deliverable: 'Completed Ikigai map. Energy audit done. Ideal work week written. 3 paths shortlisted. Financial floor calculated.',
  },
  {
    week: 4, phase: 1, title: 'Path Validation Sprint',
    objective: 'Test your 3 career path hypotheses against reality before committing to any of them.',
    why: 'Your instincts about your next role are almost certainly wrong in at least one important way. The only way to validate is to talk to real people doing the work. One conversation will teach you more than 10 hours of research.',
    tasks: [
      { task: 'Have 3 "curiosity conversations" (one per path)', time: '3 hrs', detail: 'DM or email people doing work you\'re exploring. Script: "Hi [Name], I came across your work. I\'m at a career transition point and exploring [path]. Would you be open to a 20-min call? I\'m not looking for a job — just perspective." Ask: How did you get here? What\'s a real day like? What do you wish you\'d known?' },
      { task: 'Do one "shadow" exercise per path', time: '6 hrs', detail: 'AI Consultant: draft a fake consulting proposal. Freelance RevOps: look at Toptal and Catalant listings — what are people asking for? Strategy role: pull 5 JDs and reverse-engineer what they actually want vs. what they say.' },
      { task: 'Score each path on 6 criteria', time: '2 hrs', detail: 'Rate 1–5: Income Potential | Lifestyle Fit | Stress Level | Time to First Income | Alignment with Strengths | Excitement. The highest score isn\'t automatically right, but the exercise forces you to be explicit about tradeoffs.' },
      { task: 'Formally eliminate one path', time: '30 min', detail: 'Write one paragraph explaining which path you\'re cutting and why. Constraint drives clarity. Two focused paths beat three vague ones.' },
      { task: 'Update your LinkedIn for quiet exploration', time: '2 hrs', detail: 'Headline: "Revenue Strategy & AI | Exploring new challenges in [areas]." About: warm, curious, forward-looking. Turn on Open to Work (private mode). Plant seeds with no pressure.' },
    ],
    reflections: [
      'What did the conversations reveal that surprised me about my assumptions?',
      'Which path felt most "like me" when I was actually doing the taste test?',
      'What fear is hiding behind any path I keep mentally avoiding?',
    ],
    deliverable: '3 curiosity conversations done. 3 paths scored. 1 eliminated. 2 remaining paths clear. LinkedIn updated.',
  },
  {
    week: 5, phase: 1, title: 'AI Foundations',
    objective: 'Build a working, practical understanding of AI tools — focused on business use, not coding.',
    why: 'AI is not a skill — it\'s a meta-skill that amplifies everything else you do. You don\'t need to code. You need to know how to deploy these tools to solve real revenue and strategy problems, which is exactly where your experience already lives.',
    tasks: [
      { task: 'Learn how LLMs actually work (high-level)', time: '1 hr', detail: 'Watch Andrej Karpathy\'s "Intro to LLMs" on YouTube (1 hr). Just enough to understand what these tools are and aren\'t. This context makes you significantly smarter at using them.' },
      { task: 'Master prompt engineering for strategy work', time: '4 hrs', detail: 'Read Anthropic\'s prompt engineering guide at docs.anthropic.com. Then practice 10 prompts in Claude: data analysis, writing, competitive research, decision frameworks. Build a personal prompt library — save every good prompt you write.' },
      { task: 'Learn Perplexity AI for fast research', time: '2 hrs', detail: 'Perplexity is cited, web-connected research at speed. Practice: research a company before a call, understand a market in 20 minutes, find competitors in a new space. This replaces 2 hours of Googling with 10 minutes of directed research.' },
      { task: 'Explore automation: Zapier + Make.com', time: '4 hrs', detail: 'Sign up for both free tiers. Build one automation: e.g., "When I get an email tagged [keyword], add it to a sheet and draft a reply." Understanding automation workflows is table stakes for any AI-adjacent role.' },
      { task: 'Start your AI learning log', time: '30 min', detail: 'Create a Notion doc or Google Doc: "AI Tools | What I Built | What I Learned." This becomes evidence of your learning and a portfolio entry.' },
    ],
    reflections: [
      'Which AI tool surprised me most with what it could actually do?',
      'What problem from my last job could I have solved in a fraction of the time with these tools?',
      'How would I explain the business value of AI to a skeptical CRO?',
    ],
    deliverable: 'Prompt library (10+ prompts). 1 automation built. AI learning log started. Core tools active.',
  },
  {
    week: 6, phase: 1, title: 'AI for Revenue & Strategy',
    objective: 'Go deep on AI applications specific to your domain — where your 10,000 hours already live.',
    why: 'Generic AI knowledge is table stakes. What makes you genuinely valuable is applying AI inside revenue operations, strategy, and GTM functions. This is the intersection where almost nobody else is operating yet.',
    tasks: [
      { task: 'Build an AI-powered territory analysis (Portfolio Project #1)', time: '5 hrs', detail: 'Take a public dataset (Kaggle or data.gov). Use Claude to: build a territory segmentation framework, identify top-tier accounts, model revenue distribution. Document your thinking. This is your first portfolio piece.' },
      { task: 'Create an AI-enhanced revenue reporting template', time: '4 hrs', detail: 'Build a reusable tool: a Google Sheet or Notion template where you paste weekly revenue data and a prompt generates an executive summary + risks + recommendations. Productize it. This is something you can show and demo.' },

function render() {
  const area = document.getElementById('scrollArea');
  if (currentTab === 'overview') area.innerHTML = renderOverview();
  else if (currentTab === 'weeks') area.innerHTML = renderWeeks();
  else if (currentTab === 'ai') area.innerHTML = renderAI();
  else if (currentTab === 'quit') area.innerHTML = renderQuit();
  else if (currentTab === 'schedule') area.innerHTML = renderSchedule();
  else if (currentTab === 'scorecard') area.innerHTML = renderScorecard();

  updateProgress();
  attachEvents();
  area.scrollTop = 0;
}

function updateProgress() {
  const day = getDayNumber();
  const pct = Math.min((day / 90) * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('dayBadge').textContent = 'Day ' + day;
}

  </div>`;
}

// ── WEEKS ─────────────────────────────────────────────────
function renderWeeks() {
  return weeks.map(w => {
    const isOpen = openWeek === w.week;
    const pc = phaseColors[w.phase];
    return `
    <div class="card" style="${isOpen ? `border-color:${pc};` : ''}border-top: 3px solid ${pc};">
      <div class="card-header" onclick="toggleWeek(${w.week})">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
          <div class="week-num" style="color:${pc}">${w.week}</div>
          <div class="week-meta">
            <div class="week-phase" style="color:${pc}">${phases[w.phase].title}</div>
            <div class="week-title">${w.title}</div>
          </div>
        </div>
        <div class="chevron ${isOpen?'open':''}">›</div>
      </div>
      ${isOpen ? `
      <div class="card-body">
        <div class="obj-box" style="background:${pc}18;border-left-color:${pc};">
          <div class="section-label" style="color:${pc};margin-top:0;">Objective</div>
          <p style="font-size:13px;color:var(--text);line-height:1.65;">${w.objective}</p>
        </div>

        <div class="section-label">Why This Matters</div>
        <p style="font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:4px;">${w.why}</p>

        <div class="section-label">Tasks · ${w.tasks.length} this week</div>
        <div style="background:var(--surface);border-radius:10px;overflow:hidden;">
        ${w.tasks.map((t,ti) => {
          const tkey = `w${w.week}t${ti}`;
          const isExp = openTask === tkey;
          return `
          <div class="task-item">
            <div class="task-row" onclick="toggleTask('${tkey}')">
              <div class="task-num" style="border-color:${pc};color:${pc};">${ti+1}</div>
              <div class="task-info">
                <div class="task-name">${t.task}</div>
                <div class="task-time">⏱ ${t.time}</div>
              </div>
              <div class="chevron ${isExp?'open':''}" style="font-size:14px;">›</div>
            </div>
            ${isExp ? `<div class="task-detail">${t.detail}</div>` : ''}
          </div>`;
        }).join('')}
        </div>

        <div class="section-label">Reflection Prompts</div>
        ${w.reflections.map(r => `
        <div class="reflection-item">
          <span class="reflection-diamond">✦</span>
          <span class="reflection-text">${r}</span>
        </div>`).join('')}

        <div class="deliverable">
          <div class="deliverable-label">✓ Week Deliverable</div>
          <div class="deliverable-text">${w.deliverable}</div>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

// ── AI PATH ───────────────────────────────────────────────

  <div class="card">
    <div style="padding:16px 18px 6px;">

    </div>
    <div style="padding:0 18px 14px;">
    ${aiTools.map(t => `
      <div class="ai-tool">
        <div class="ai-icon" style="background:${t.color}22;">${t.icon}</div>
        <div>
          <div class="ai-tool-name" style="color:${t.color}">${t.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${t.use}</div>

    <div style="padding:0 18px 14px;">
    ${[
      { num: '#1', title: 'AI-Powered Territory Analysis', week: 'Week 6', desc: 'Take a public dataset. Use Claude to build a territory segmentation framework, identify top accounts, and model revenue distribution. Documents your process end-to-end.' },
      { num: '#2', title: 'Company AI Opportunity Audit', week: 'Week 6', desc: 'Pick a company you\'d want to work for. Write a 2-page audit: where are they underusing AI? What would you implement? What would it save? This is a consulting pitch in disguise.' },
      { num: '#3', title: 'Custom Revenue Strategy GPT', week: 'Week 7', desc: 'Build a Claude Project that acts as a "Revenue Strategy Advisor." Upload frameworks, write a system prompt, test it. Completely demoable in interviews and to clients.' },
    ].map(p => `

  <div class="card">
    <div style="padding:16px 18px 6px;">

    </div>
    <div style="padding:0 18px 14px;">
    ${[
      ['In your resume', 'Create a "Tools & Technologies" section. Don\'t just list tools — add context: "Applied AI tools to reduce revenue reporting cycle from 3 days to 4 hours."'],
      ['In interviews', 'Lead with a specific example: "I built X using Y tool. It helped Z stakeholder make better decisions about W." Offer to demo. This wins.'],
      ['In networking', 'Share your AI one-pager. It\'s a conversation starter that immediately positions you differently from every other RevOps professional in the room.'],
      ['For consulting', 'Position as an "AI-native revenue operator." Your pitch: you bring both the domain expertise AND the AI toolkit to deploy it. Most consultants have one or the other.'],
    ].map(([label, text]) => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;">${label}</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6;">${text}</div>

// ── QUIT ──────────────────────────────────────────────────
function renderQuit() {
  return `
  <div class="personal-banner">
    <h3>Your Exit Strategy</h3>
    <p>You're not leaving impulsively — you're leaving intentionally. This section is your blueprint for doing it in a way that protects your reputation, your relationships, and your peace of mind.</p>
  </div>

  ${quitSections.map((s, si) => `
  <div class="card quit-section">
    <div class="card-header" onclick="toggleQuit(${si})">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--white);">${s.title}</div>
      <div class="chevron ${openQuit===si?'open':''}">›</div>
    </div>
    ${openQuit===si ? `
    <div class="card-body">
      ${s.items.map(item => `
      <div class="quit-rule">
        <span class="quit-bullet">◆</span>
        <span class="quit-text">${item}</span>
      </div>`).join('')}
      ${s.note ? `<div class="note-box">${s.note}</div>` : ''}
    </div>` : ''}
  </div>`).join('')}

  <div class="card">
    <div class="card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--white);">Resignation Letter Template</div>
      <div class="chevron">›</div>
    </div>
    <div style="display:none;padding:0 18px 18px;">
      <div style="background:var(--surface);border-radius:10px;padding:16px;font-size:13px;color:var(--text);line-height:2;">
        <p>Hi [Manager's Name],</p><br>
        <p>I want to let you know that I've made the decision to move on from [Company]. My last day will be [Date].</p><br>
        <p>Working here has genuinely shaped how I think about [skill/area], and I'm grateful for the opportunities, the trust, and the team.</p><br>
        <p>I'm committed to a smooth transition. I'll have a full handoff document ready by [date] and am happy to help train whoever takes over my responsibilities.</p><br>
        <p>Thank you for everything.</p><br>
        <p>[Your name]</p>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px;font-style:italic;">Keep it short. Don't over-explain. Never put your real reasons in writing.</div>
    </div>
  </div>`;
}

// ── SCHEDULE ──────────────────────────────────────────────
function renderSchedule() {
  return `
  <div class="personal-banner">
    <h3>Your Daily Rhythm</h3>
    <p>Three distinct schedules — one for each phase. The structure protects you from both laziness and overwork. Adapt it to your life, but protect the deep work blocks and the morning ritual.</p>
  </div>

  ${schedules.map((s, si) => `
  <div class="card">
    <div class="card-header" onclick="toggleSchedule(${si})">
      <div>
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:${s.color};margin-bottom:4px;">${s.label.split('·')[0].trim()}</div>
        <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--white);">${s.label.split('·').slice(1).join('·').trim()}</div>
      </div>
      <div class="chevron ${openSchedule===si?'open':''}">›</div>
    </div>
    ${openSchedule===si ? `
    <div class="card-body">
      ${s.slots.map(slot => `
      <div class="sched-row">
        <div class="sched-time" style="color:${s.color}">${slot.time}</div>
        <div class="sched-act">${slot.act}</div>
      </div>`).join('')}
    </div>` : ''}
  </div>`).join('')}

  <div class="card">
    <div style="padding:16px 18px 4px;">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--white);">Non-Negotiables</div>
    </div>
    <div style="padding:0 18px 14px;">
    ${[
      ['Protect your mornings', 'First 2 hours = movement and no screens. Every day. This one rule changes everything.'],
      ['Exercise is non-optional', 'Physical activity is the best cognitive recovery tool available. Treat it as a work meeting.'],
      ['Deep work before shallow work', 'Do your hardest creative work in the morning block. Admin and outreach come after.'],
      ['One full day off per week', 'Take Sunday completely off. No laptop. No job search. Rest is productive.'],
      ['Evenings are for recovery', 'Wind down by 9pm. Sleep is the foundation everything else rests on.'],
    ].map(([t,d]) => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;">${t}</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5;">${d}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── SCORECARD ─────────────────────────────────────────────
function renderScorecard() {
  const total = scorecard.reduce((a, c) => a + c.items.length, 0);
  const done = Object.values(checks).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  const grade = pct >= 90 ? { label: 'Excellent', note: 'You\'re locked in.', color: 'var(--teal)' }
    : pct >= 70 ? { label: 'On Track', note: 'Note what you missed and why.', color: 'var(--gold)' }
    : pct >= 50 ? { label: 'Course Correct', note: 'Something\'s off. Audit your energy.', color: 'var(--rose)' }
    : { label: 'Reset Week', note: 'Remove 2 tasks next week. Simpler beats nothing.', color: 'var(--muted)' };

  return `
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;text-align:center;">
    <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:${grade.color};line-height:1;">${pct}%</div>
    <div style="font-family:'Playfair Display',serif;font-size:18px;color:var(--white);margin:4px 0;">${grade.label}</div>
    <div style="font-size:12px;color:var(--muted);">${done} of ${total} items · ${grade.note}</div>
    <button onclick="clearChecks()" style="margin-top:12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 14px;border-radius:100px;cursor:pointer;">Reset for new week</button>
  </div>

  ${scorecard.map((cat, ci) => `
  <div class="card">
    <div style="padding:14px 18px 8px;border-left:3px solid ${cat.color};">
      <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--white);">${cat.cat}</div>
    </div>
    <div style="padding:0 18px 10px;">
    ${cat.items.map((item, ii) => {
      const key = `c${ci}i${ii}`;
      const isChecked = checks[key];
      return `
      <div class="check-item" onclick="toggleCheck('${key}')">
        <div class="check-box ${isChecked?'checked':''}">${isChecked ? `<span style="color:${cat.color};font-size:12px;">✓</span>` : ''}</div>
        <span class="check-label ${isChecked?'checked':''}">${item}</span>
      </div>`;
    }).join('')}
    </div>
  </div>`).join('')}

  <div class="card">
    <div style="padding:14px 18px 4px;">
      <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--white);">Sunday Review Prompts</div>
    </div>
    <div style="padding:0 18px 14px;">
    ${[
      'What was my biggest win this week?',
      'What did I avoid that I need to do next week?',
      'What drained my energy? What gave me energy?',
      'Am I on track with my 90-day arc? What needs to shift?',
      'Who do I need to follow up with this week?',
    ].map(q => `
    <div class="reflection-item" style="padding:8px 0;border-bottom:1px solid var(--border);">
      <span class="reflection-diamond">✦</span>
      <span class="reflection-text">${q}</span>
    </div>`).join('')}
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────
function attachEvents() {}

function toggleWeek(n) { openWeek = openWeek === n ? null : n; openTask = null; render(); }
function toggleTask(key) { openTask = openTask === key ? null : key; render(); }
function toggleQuit(n) { openQuit = openQuit === n ? null : n; render(); }
function toggleSchedule(n) { openSchedule = openSchedule === n ? null : n; render(); }
function toggleCheck(key) { checks[key] = !checks[key]; saveChecks(); render(); }
function clearChecks() { checks = {}; saveChecks(); render(); }

function showTab(id, btn) {
  currentTab = id;
  openWeek = null; openTask = null; openQuit = null; openSchedule = null;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const map = { overview: 0, weeks: 1, ai: 2, quit: 3, schedule: 4, scorecard: 5 };
    document.querySelectorAll('.nav-tab')[map[id]]?.classList.add('active');
  }
  render();
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
